<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnajakAngkor Football Team</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* ============================================================
               ROOT VARIABLES — 2026 Design System
               ============================================================ */
        :root {
            /* Primary Palette */
            --primary: #6C3CE1;
            --primary-light: #8B5CF6;
            --primary-dark: #4F2BAE;
            --primary-gradient: linear-gradient(135deg, #6C3CE1 0%, #A855F7 50%, #EC4899 100%);
            --secondary: #0F172A;
            --accent: #F59E0B;

            /* Neutrals */
            --bg-body: #F8FAFC;
            --bg-surface: #FFFFFF;
            --bg-glass: rgba(255, 255, 255, 0.55);
            --bg-glass-border: rgba(255, 255, 255, 0.25);
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
            --border-color: #E2E8F0;

            /* Shadows — 2026 Glassmorphism + Soft Depth */
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 16px 64px rgba(0, 0, 0, 0.10);
            --shadow-glow: 0 0 40px rgba(108, 60, 225, 0.25);
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.06);

            /* Radius */
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-full: 9999px;

            /* Transitions */
            --transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            --transition-fast: 0.2s ease;

            /* Font */
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Dark Mode */
        [data-theme="dark"] {
            --bg-body: #0B1121;
            --bg-surface: #1A2332;
            --bg-glass: rgba(26, 35, 50, 0.65);
            --bg-glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border-color: #2D3A4F;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 16px 64px rgba(0, 0, 0, 0.5);
            --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* ============================================================
               RESET & BASE
               ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font);
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background var(--transition), color var(--transition);
            min-height: 100vh;
        }

        a {
            color: inherit;
            text-decoration: none;
        }
        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            background: none;
        }
        img {
            max-width: 100%;
            display: block;
        }
        ul {
            list-style: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-body);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: var(--radius-full);
        }

        /* ============================================================
               UTILITY CLASSES
               ============================================================ */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .glass {
            background: var(--bg-glass);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--bg-glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-glass);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 0.9rem;
            transition: all var(--transition-fast);
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: #fff;
            box-shadow: 0 4px 16px rgba(108, 60, 225, 0.35);
        }
        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 32px rgba(108, 60, 225, 0.45);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-primary);
            border-color: var(--border-color);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .btn-ghost {
            color: var(--text-secondary);
        }
        .btn-ghost:hover {
            color: var(--primary);
            background: rgba(108, 60, 225, 0.08);
        }

        .btn-danger {
            background: #EF4444;
            color: #fff;
        }
        .btn-danger:hover {
            background: #DC2626;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.35);
        }

        .btn-sm {
            padding: 6px 16px;
            font-size: 0.8rem;
        }
        .btn-lg {
            padding: 14px 36px;
            font-size: 1rem;
        }

        .badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: var(--radius-full);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .badge-success {
            background: #D1FAE5;
            color: #065F46;
        }
        .badge-danger {
            background: #FEE2E2;
            color: #991B1B;
        }
        .badge-warning {
            background: #FEF3C7;
            color: #92400E;
        }
        .badge-info {
            background: #DBEAFE;
            color: #1E40AF;
        }
        .badge-primary {
            background: rgba(108, 60, 225, 0.15);
            color: var(--primary);
        }

        [data-theme="dark"] .badge-success {
            background: #064E3B;
            color: #6EE7B7;
        }
        [data-theme="dark"] .badge-danger {
            background: #7F1D1D;
            color: #FCA5A5;
        }
        [data-theme="dark"] .badge-warning {
            background: #78350F;
            color: #FCD34D;
        }
        [data-theme="dark"] .badge-info {
            background: #1E3A5F;
            color: #93C5FD;
        }
        [data-theme="dark"] .badge-primary {
            background: rgba(108, 60, 225, 0.25);
            color: #A78BFA;
        }

        .section-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }

        .section-subtitle {
            color: var(--text-secondary);
            font-size: 1.05rem;
            max-width: 600px;
        }

        /* ============================================================
               HEADER / NAV
               ============================================================ */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 12px 0;
            transition: all var(--transition);
        }
        .header.scrolled {
            background: var(--bg-glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--bg-glass-border);
            box-shadow: var(--shadow-sm);
            padding: 8px 0;
        }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--text-primary);
        }
        .logo img {
            height: 44px;
            width: auto;
            border-radius: var(--radius-sm);
        }
        .logo span {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-links a {
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            position: relative;
        }
        .nav-links a:hover,
        .nav-links a.active {
            color: var(--text-primary);
            background: rgba(108, 60, 225, 0.08);
        }
        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            border-radius: var(--radius-full);
            background: var(--primary-gradient);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-glass);
            border: 1px solid var(--bg-glass-border);
            font-size: 1.1rem;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
        }
        .theme-toggle:hover {
            background: var(--primary);
            color: #fff;
            transform: rotate(20deg);
        }

        .mobile-toggle {
            display: none;
            width: 40px;
            height: 40px;
            border-radius: var(--radius-full);
            background: var(--bg-glass);
            border: 1px solid var(--bg-glass-border);
            font-size: 1.2rem;
            color: var(--text-primary);
        }

        /* ============================================================
               HERO
               ============================================================ */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 120px 0 80px;
            position: relative;
            overflow: hidden;
            background: var(--bg-body);
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(108, 60, 225, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        .hero-content h1 {
            font-size: 3.8rem;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.04em;
            margin-bottom: 20px;
        }
        .hero-content h1 .highlight {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-content p {
            font-size: 1.15rem;
            color: var(--text-secondary);
            max-width: 480px;
            margin-bottom: 32px;
            line-height: 1.7;
        }
        .hero-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .hero-image {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .hero-image .hero-card {
            width: 100%;
            max-width: 480px;
            padding: 32px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--bg-glass-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            text-align: center;
        }
        .hero-image .hero-card img {
            width: 120px;
            height: 120px;
            border-radius: var(--radius-full);
            margin: 0 auto 16px;
            border: 4px solid rgba(108, 60, 225, 0.2);
            object-fit: cover;
        }
        .hero-image .hero-card h3 {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .hero-image .hero-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .hero-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        .hero-stats .stat {
            text-align: center;
        }
        .hero-stats .stat .number {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--primary);
        }
        .hero-stats .stat .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* ============================================================
               SECTION: Players
               ============================================================ */
        .section {
            padding: 80px 0;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 48px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
        }

        .player-card {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 24px 20px 20px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }
        .player-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }
        .player-card .avatar {
            width: 88px;
            height: 88px;
            border-radius: var(--radius-full);
            margin: 0 auto 12px;
            object-fit: cover;
            border: 3px solid rgba(108, 60, 225, 0.15);
            transition: all var(--transition);
        }
        .player-card:hover .avatar {
            border-color: var(--primary);
            transform: scale(1.04);
        }
        .player-card .name {
            font-weight: 700;
            font-size: 1.05rem;
        }
        .player-card .position {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-weight: 600;
        }
        .player-card .number {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 2rem;
            font-weight: 900;
            color: rgba(108, 60, 225, 0.08);
            line-height: 1;
        }
        .player-card .stats-mini {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        .player-card .stats-mini span {
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ============================================================
               SECTION: Matches
               ============================================================ */
        .matches-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .match-item {
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: all var(--transition-fast);
            flex-wrap: wrap;
            gap: 12px;
        }
        .match-item:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow-md);
        }
        .match-teams {
            display: flex;
            align-items: center;
            gap: 16px;
            font-weight: 600;
        }
        .match-teams .team {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .match-teams .team img {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-full);
            object-fit: cover;
        }
        .match-score {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary);
            padding: 0 12px;
        }
        .match-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .match-meta .date {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ============================================================
               SECTION: News
               ============================================================ */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .news-card {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: all var(--transition);
        }
        .news-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }
        .news-card .image {
            height: 180px;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.3);
        }
        .news-card .body {
            padding: 20px 20px 24px;
        }
        .news-card .body .tag {
            display: inline-block;
            padding: 2px 12px;
            border-radius: var(--radius-full);
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            background: rgba(108, 60, 225, 0.1);
            color: var(--primary);
            margin-bottom: 8px;
        }
        .news-card .body h4 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .news-card .body p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .news-card .body .date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 12px;
            display: block;
        }

        /* ============================================================
               SECTION: Gallery
               ============================================================ */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .gallery-item {
            aspect-ratio: 1;
            border-radius: var(--radius-md);
            overflow: hidden;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: rgba(255, 255, 255, 0.2);
            transition: all var(--transition);
            cursor: pointer;
            position: relative;
        }
        .gallery-item:hover {
            transform: scale(1.03);
            box-shadow: var(--shadow-glow);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .gallery-item .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
        }
        .gallery-item:hover .overlay {
            opacity: 1;
        }

        /* ============================================================
               ADMIN PANEL
               ============================================================ */
        .admin-layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            min-height: 100vh;
            gap: 0;
        }
        .admin-sidebar {
            background: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            padding: 24px 16px;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .admin-sidebar .logo-sm {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.1rem;
            padding: 8px 12px;
            margin-bottom: 16px;
        }
        .admin-sidebar .logo-sm img {
            height: 32px;
            width: auto;
            border-radius: var(--radius-sm);
        }
        .admin-sidebar .logo-sm span {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .admin-sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
        }
        .admin-sidebar .nav-item:hover {
            background: rgba(108, 60, 225, 0.06);
            color: var(--text-primary);
        }
        .admin-sidebar .nav-item.active {
            background: rgba(108, 60, 225, 0.1);
            color: var(--primary);
            font-weight: 600;
        }
        .admin-sidebar .nav-item i {
            width: 20px;
            text-align: center;
            font-size: 1rem;
        }
        .admin-sidebar .nav-item .badge {
            margin-left: auto;
        }

        .admin-sidebar .sidebar-footer {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .admin-main {
            padding: 32px 40px;
            background: var(--bg-body);
        }
        .admin-main .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .admin-main .page-header h2 {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .admin-table-wrap {
            background: var(--bg-surface);

    <script>
        // ================================================================

        // Supabase config (using the provided keys)
        const SUPABASE_CONFIG = {

        // App state

        // ================================================================

        // ================================================================

        const supabase = {
            headers: {

                'Authorization': `Bearer ${SUPABASE_CONFIG.anonKey}`,
                'Content-Type': 'application/json',

            async query(table, method = 'GET', body = null, params = '') {
                const url = `${SUPABASE_CONFIG.url}/rest/v1/${table}${params}`;
                const options = {
                    method,
                    headers: this.headers,
                };
                if (body) options.body = JSON.stringify(body);

                try {
                    const res = await fetch(url, options);
                    if (!res.ok) {
                        const err = await res.text();
                        throw new Error(err || `HTTP ${res.status}`);
                    }
                    if (res.status === 204) return [];
                    return await res.json();
                } catch (e) {
                    console.error('Supabase error:', e);
                    // For demo, if table doesn't exist, return mock data
                    return null;
                }
            },

            async signIn(email, password) {

                { id: '4', home: 'Kampong Cham Tigers', away: 'AnajakAngkor', homeScore: null, awayScore: null,

                    date: '2026-07-16', category: 'Match Report' },

                    date: '2026-07-10', category: 'Transfer' },

        };

        async function fetchData(table) {
            const result = await supabase.query(table);
            if (result && Array.isArray(result)) return result;
            // Fallback to mock data
            return MOCK_DATA[table] || [];
        }

        async function insertData(table, data) {
            const result = await supabase.query(table, 'POST', data);
            if (result && Array.isArray(result)) return result[0];
            // Mock: generate an ID and return
            return { ...data, id: Date.now().toString() };
        }

        async function updateData(table, id, data) {
            const result = await supabase.query(table, 'PATCH', data, `?id=eq.${id}`);
            if (result && Array.isArray(result)) return result[0];
            return { ...data, id };
        }

        async function deleteData(table, id) {
            await supabase.query(table, 'DELETE', null, `?id=eq.${id}`);
            return true;
        }

        // ================================================================
        // 4. RENDER ENGINE
        // ================================================================

        const app = document.getElementById('app');

        // --- Helper: Toast ---
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
                ${message}
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(40px)';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // --- Helper: Render with transition ---
        function render(html) {
            app.style.opacity = '0';
            setTimeout(() => {
                app.innerHTML = html;
                app.style.opacity = '1';
            }, 80);
        }

        // --- Theme ---
        function toggleTheme() {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', state.theme);
            localStorage.setItem('theme', state.theme);
            renderApp();
        }

        function loadTheme() {
            const saved = localStorage.getItem('theme');
            if (saved) {
                state.theme = saved;
                document.documentElement.setAttribute('data-theme', saved);
            }
        }

        // --- Navigation ---
        function navigate(page, data = null) {
            state.currentPage = page;
            if (page.startsWith('admin')) {
                state.adminView = page.replace('admin-', '') || 'players';
            }
            state.selectedItem = data;
            renderApp();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- Auth ---
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            state.loading = true;
            renderApp();

            const { data, error } = await supabase.signIn(email, password);
            state.loading = false;

            if (error) {
                showToast(error.message, 'error');
                renderApp();
                return;
            }
            state.isLoggedIn = true;
            state.user = data.user;
            showToast(`Welcome back, ${data.user.email}!`, 'success');
            navigate('admin');
        }

        async function handleLogout() {
            await supabase.signOut();
            state.isLoggedIn = false;
            state.user = null;
            showToast('Logged out', 'info');
            navigate('home');
        }

        // --- CRUD Handlers ---
        async function handleAddItem(table, formData) {
            try {
                const result = await insertData(table, formData);
                if (result) {
                    showToast(`${table.slice(0, -1)} added successfully!`, 'success');
                    await refreshData(table);
                    navigate(`admin-${table}`);
                }
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        async function handleEditItem(table, id, formData) {
            try {
                const result = await updateData(table, id, formData);
                if (result) {
                    showToast(`${table.slice(0, -1)} updated successfully!`, 'success');
                    await refreshData(table);
                    navigate(`admin-${table}`);
                }
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        async function handleDeleteItem(table, id) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            try {
                await deleteData(table, id);
                showToast('Deleted successfully!', 'success');
                await refreshData(table);
                navigate(`admin-${table}`);
            } catch (e) {
                showToast(e.message, 'error');
            }

        async function refreshData(table) {
            const data = await fetchData(table);
            state[table] = data;
        }

                                            <button class="delete-btn" onclick="handleDeleteItem('matches', '${m.id}')"><i class="fas fa-trash"></i></button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                            ${matches.length === 0 ? `
                                <tr><td colspan="7">
                                    <div class="empty-state">
                                        <i class="fas fa-calendar-alt"></i>
                                        <h4>No matches yet</h4>
                                        <p>Schedule your first match.</p>
                                    </div>
                                </td></tr>
                            ` : ''}
                        </tbody>
                    </table>
                </div>
            `);
        }

        // --- ADMIN: News ---
        function renderAdminNews() {
            const news = state.news.length ? state.news : MOCK_DATA.news;
            const showForm = state.selectedItem && state.selectedItem._form;

            let formHtml = '';
            if (showForm) {
                const item = state.selectedItem._formData || {};
                const isEdit = state.selectedItem._mode === 'edit';
                formHtml = `
                    <div class="admin-form" style="margin-bottom:32px;">
                        <h3 style="margin-bottom:16px; font-weight:700;">${isEdit ? 'Edit News' : 'Add News'}</h3>
                        <form onsubmit="handleNewsForm(event)">
                            <div class="form-group">
                                <label>Title</label>
                                <input type="text" id="newsTitle" value="${item.title || ''}" required />
                            </div>
                            <div class="form-group">
                                <label>Excerpt</label>
                                <textarea id="newsExcerpt" rows="3">${item.excerpt || ''}</textarea>
                            </div>
                            <div class="form-group">
                                <label>Category</label>
                                <input type="text" id="newsCategory" value="${item.category || 'News'}" placeholder="Match Report, Transfer, etc." />
                            </div>
                            <div class="form-group">
                                <label>Date</label>
                                <input type="date" id="newsDate" value="${item.date || ''}" />
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas ${isEdit ? 'fa-save' : 'fa-plus'}"></i> ${isEdit ? 'Update' : 'Add'} News
                                </button>
                                <button type="button" class="btn btn-outline" onclick="navigate('admin-news')">Cancel</button>
                            </div>
                        </form>
                    </div>
                `;
            }

            return renderAdminLayout(`
                <div class="page-header">
                    <div>
                        <h2>News <span class="badge badge-primary" style="font-size:0.8rem; vertical-align:middle;">${news.length}</span></h2>
                        <p style="color:var(--text-secondary);">Manage club news and updates.</p>
                    </div>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                        <button class="btn btn-primary btn-sm" onclick="showNewsForm()">
                            <i class="fas fa-plus"></i> Add News
                        </button>
                    </div>
                </div>
                ${formHtml}
                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Date</th>
                                <th style="text-align:right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${news.map(n => `
                                <tr>
                                    <td><strong>${n.title}</strong></td>
                                    <td><span class="badge badge-info">${n.category || 'News'}</span></td>
                                    <td>${n.date || '-'}</td>
                                    <td style="text-align:right;">
                                        <div class="actions" style="justify-content:flex-end;">
                                            <button class="edit-btn" onclick="editNews('${n.id}')"><i class="fas fa-edit"></i> Edit</button>
                                            <button class="delete-btn" onclick="handleDeleteItem('news', '${n.id}')"><i class="fas fa-trash"></i></button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                            ${news.length === 0 ? `
                                <tr><td colspan="4">
                                    <div class="empty-state">
                                        <i class="fas fa-newspaper"></i>
                                        <h4>No news yet</h4>
                                        <p>Publish your first news article.</p>
                                    </div>
                                </td></tr>
                            ` : ''}
                        </tbody>
                    </table>
                </div>
            `);
        }

        // --- ADMIN: Gallery ---
        function renderAdminGallery() {
            const gallery = state.gallery.length ? state.gallery : MOCK_DATA.gallery;
            const showForm = state.selectedItem && state.selectedItem._form;

            let formHtml = '';
            if (showForm) {
                const item = state.selectedItem._formData || {};
                const isEdit = state.selectedItem._mode === 'edit';
                formHtml = `
                    <div class="admin-form" style="margin-bottom:32px;">
                        <h3 style="margin-bottom:16px; font-weight:700;">${isEdit ? 'Edit Gallery Item' : 'Add Gallery Item'}</h3>
                        <form onsubmit="handleGalleryForm(event)">
                            <div class="form-group">
                                <label>Title</label>
                                <input type="text" id="galleryTitle" value="${item.title || ''}" required />
                            </div>
                            <div class="form-group">
                                <label>Image URL (optional)</label>
                                <input type="text" id="galleryUrl" value="${item.url || ''}" placeholder="https://example.com/image.jpg" />
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas ${isEdit ? 'fa-save' : 'fa-plus'}"></i> ${isEdit ? 'Update' : 'Add'} Item
                                </button>
                                <button type="button" class="btn btn-outline" onclick="navigate('admin-gallery')">Cancel</button>
                            </div>
                        </form>
                    </div>
                `;
            }

            return renderAdminLayout(`
                <div class="page-header">
                    <div>
                        <h2>Gallery <span class="badge badge-primary" style="font-size:0.8rem; vertical-align:middle;">${gallery.length}</span></h2>
                        <p style="color:var(--text-secondary);">Manage team photos and media.</p>
                    </div>
                    <div style="display:flex; gap:8px; flex-wrap:wrap;">
                        <button class="btn btn-primary btn-sm" onclick="showGalleryForm()">
                            <i class="fas fa-plus"></i> Add Image
                        </button>
                    </div>
                </div>
                ${formHtml}
                <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:16px;">
                    ${gallery.map(g => `
                        <div style="background:var(--bg-surface); border-radius:var(--radius-md); border:1px solid var(--border-color); overflow:hidden; position:relative; aspect-ratio:1;">
                            <div style="background:linear-gradient(135deg, #6C3CE1, #EC4899); width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.2); font-size:2.5rem;">
                                <i class="fas fa-image"></i>
                            </div>
                            <div style="position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.6); padding:8px 12px; display:flex; justify-content:space-between; align-items:center;">
                                <span style="color:#fff; font-size:0.75rem; font-weight:500;">${g.title || 'Untitled'}</span>
                                <div style="display:flex; gap:4px;">
                                    <button class="edit-btn" style="background:rgba(255,255,255,0.15); color:#fff; padding:2px 8px; border-radius:4px; font-size:0.65rem;" onclick="editGallery('${g.id}')"><i class="fas fa-edit"></i></button>
                                    <button class="delete-btn" style="background:rgba(239,68,68,0.3); color:#fff; padding:2px 8px; border-radius:4px; font-size:0.65rem;" onclick="handleDeleteItem('gallery', '${g.id}')"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                    ${gallery.length === 0 ? `
                        <div style="grid-column:1/-1;">
                            <div class="empty-state">
                                <i class="fas fa-images"></i>
                                <h4>No images yet</h4>
                                <p>Add photos to your gallery.</p>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `);
        }

        // --- ADMIN: Settings ---
        function renderAdminSettings() {
            return renderAdminLayout(`
                <div class="page-header">
                    <div>
                        <h2>Settings</h2>
                        <p style="color:var(--text-secondary);">Manage your team portal settings.</p>
                    </div>
                </div>
                <div style="display:grid; gap:24px; max-width:640px;">
                    <div class="admin-form">
                        <h3 style="margin-bottom:16px; font-weight:700;">Theme Preference</h3>
                        <div style="display:flex; gap:12px;">
                            <button class="btn ${state.theme === 'light' ? 'btn-primary' : 'btn-outline'}" onclick="toggleTheme()">
                                <i class="fas fa-sun"></i> Light
                            </button>
                            <button class="btn ${state.theme === 'dark' ? 'btn-primary' : 'btn-outline'}" onclick="toggleTheme()">
                                <i class="fas fa-moon"></i> Dark
                            </button>
                        </div>
                    </div>
                    <div class="admin-form">
                        <h3 style="margin-bottom:16px; font-weight:700;">Account</h3>
                        <p style="color:var(--text-secondary); margin-bottom:12px;">
                            Logged in as <strong>${state.user?.email || 'admin@anajak.com'}</strong>
                        </p>
                        <button class="btn btn-danger" onclick="handleLogout()">
                            <i class="fas fa-sign-out-alt"></i> Sign Out
                        </button>
                    </div>
                    <div class="admin-form">
                        <h3 style="margin-bottom:16px; font-weight:700;">About</h3>
                        <p style="color:var(--text-secondary);">
                            <strong>AnajakAngkor FC</strong> — Full-stack admin panel built with modern 2026 design trends.
                            <br /><br />
                            <span class="badge badge-primary">Next.js</span>
                            <span class="badge badge-info">Supabase</span>
                            <span class="badge badge-success">Tailwind</span>
                            <span class="badge badge-warning">2026</span>
                        </p>
                    </div>
                </div>
            `);
        }

        // ================================================================
        // 6. FORM HANDLERS (global functions for inline onclick)
        // ================================================================

        window.showPlayerForm = function(data = null) {
            state.selectedItem = {
                _form: true,
                _mode: data ? 'edit' : 'add',
                _formData: data || {}
            };
            navigate('admin-players');
        };

        window.editPlayer = function(id) {
            const item = state.players.find(p => p.id === id) || MOCK_DATA.players.find(p => p.id === id);
            if (item) window.showPlayerForm(item);
        };

        window.handlePlayerForm = function(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('playerName').value,
                position: document.getElementById('playerPosition').value,
                number: parseInt(document.getElementById('playerNumber').value) || 0,
                age: parseInt(document.getElementById('playerAge').value) || 0,
                goals: parseInt(document.getElementById('playerGoals').value) || 0,
                assists: parseInt(document.getElementById('playerAssists').value) || 0,
            };
            const isEdit = state.selectedItem?._mode === 'edit';
            const id = state.selectedItem?._formData?.id;
            if (isEdit && id) {
                handleEditItem('players', id, data);
            } else {
                handleAddItem('players', data);
            }
        };

        // --- Match forms ---
        window.showMatchForm = function(data = null) {
            state.selectedItem = {
                _form: true,
                _mode: data ? 'edit' : 'add',
                _formData: data || {}
            };
            navigate('admin-matches');
        };

        window.editMatch = function(id) {
            const item = state.matches.find(m => m.id === id) || MOCK_DATA.matches.find(m => m.id === id);
            if (item) window.showMatchForm(item);
        };

        window.handleMatchForm = function(e) {
            e.preventDefault();
            const data = {
                home: document.getElementById('matchHome').value,
                away: document.getElementById('matchAway').value,
                homeScore: document.getElementById('matchHomeScore').value ? parseInt(document.getElementById(
                    'matchHomeScore').value) : null,
                awayScore: document.getElementById('matchAwayScore').value ? parseInt(document.getElementById(
                    'matchAwayScore').value) : null,
                date: document.getElementById('matchDate').value,
                venue: document.getElementById('matchVenue').value,
                status: document.getElementById('matchStatus').value,
            };
            const isEdit = state.selectedItem?._mode === 'edit';
            const id = state.selectedItem?._formData?.id;
            if (isEdit && id) {
                handleEditItem('matches', id, data);
            } else {
                handleAddItem('matches', data);
            }
        };

        // --- News forms ---
        window.showNewsForm = function(data = null) {
            state.selectedItem = {
                _form: true,
                _mode: data ? 'edit' : 'add',
                _formData: data || {}
            };
            navigate('admin-news');
        };

        window.editNews = function(id) {
            const item = state.news.find(n => n.id === id) || MOCK_DATA.news.find(n => n.id === id);
            if (item) window.showNewsForm(item);
        };

        window.handleNewsForm = function(e) {
            e.preventDefault();
            const data = {
                title: document.getElementById('newsTitle').value,
                excerpt: document.getElementById('newsExcerpt').value,
                category: document.getElementById('newsCategory').value,
                date: document.getElementById('newsDate').value,
            };
            const isEdit = state.selectedItem?._mode === 'edit';
            const id = state.selectedItem?._formData?.id;
            if (isEdit && id) {
                handleEditItem('news', id, data);
            } else {
                handleAddItem('news', data);
            }
        };

        // --- Gallery forms ---
        window.showGalleryForm = function(data = null) {
            state.selectedItem = {
                _form: true,
                _mode: data ? 'edit' : 'add',
                _formData: data || {}
            };
            navigate('admin-gallery');
        };

        window.editGallery = function(id) {
            const item = state.gallery.find(g => g.id === id) || MOCK_DATA.gallery.find(g => g.id === id);
            if (item) window.showGalleryForm(item);
        };

        window.handleGalleryForm = function(e) {
            e.preventDefault();
            const data = {
                title: document.getElementById('galleryTitle').value,
                url: document.getElementById('galleryUrl').value,
            };
            const isEdit = state.selectedItem?._mode === 'edit';
            const id = state.selectedItem?._formData?.id;
            if (isEdit && id) {
                handleEditItem('gallery', id, data);
            } else {
                handleAddItem('gallery', data);
            }
        };

        // ================================================================
        // 7. MAIN RENDER
        // ================================================================

        function renderApp() {
            // If we're loading, show a spinner overlay
            if (state.loading) {
                app.innerHTML = `
                    <div style="display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-body);">
                        <div class="spinner" style="width:48px; height:48px;"></div>
                    </div>
                `;
                return;
            }

            let html = '';

            // Auth check for admin routes
            const isAdminRoute = state.currentPage === 'admin' || state.currentPage.startsWith('admin-');

            if (isAdminRoute && !state.isLoggedIn) {
                html = renderLogin();
                render(html);
                return;
            }

            // Page routing
            switch (state.currentPage) {
                case 'home':
                    html = renderHome();
                    break;
                case 'login':
                    html = renderLogin();
                    break;
                case 'admin':
                case 'admin-players':
                    html = renderAdminPlayers();
                    break;
                case 'admin-matches':
                    html = renderAdminMatches();
                    break;
                case 'admin-news':
                    html = renderAdminNews();
                    break;
                case 'admin-gallery':
                    html = renderAdminGallery();
                    break;
                case 'admin-settings':
                    html = renderAdminSettings();
                    break;
                default:
                    html = renderHome();
            }

            render(html);

            // Re-attach scroll handler for header
            setupHeaderScroll();

            // Close mobile nav on link click
            document.querySelectorAll('.nav-links a').forEach(el => {
                el.addEventListener('click', () => {
                    document.getElementById('navLinks')?.classList.remove('open');
                });
            });
        }

        // --- Header scroll effect ---
        function setupHeaderScroll() {
            const header = document.getElementById('mainHeader');
            if (!header) return;
            const handler = () => {
                if (window.scrollY > 40) {
                    header.classList.add('scrolled');
                } else {
                    header.classList.remove('scrolled');
                }
            };
            window.addEventListener('scroll', handler);
            // Initial check
            setTimeout(handler, 100);
        }

        // ================================================================
        // 8. INIT
        // ================================================================

        async function init() {
            loadTheme();

            // Load data
            state.players = await fetchData('players');
            state.matches = await fetchData('matches');
            state.news = await fetchData('news');
            state.gallery = await fetchData('gallery');

            // Check if user is already logged in (simulated)
            // For demo, we'll check localStorage
            const savedSession = localStorage.getItem('anajak_session');
            if (savedSession) {
                try {
                    const session = JSON.parse(savedSession);
                    state.isLoggedIn = true;
                    state.user = session.user;
                } catch (e) {}
            }

            renderApp();
        }

        // Override login to save session
        const originalLogin = handleLogin;
        window.handleLogin = async function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            state.loading = true;
            renderApp();

            const { data, error } = await supabase.signIn(email, password);
            state.loading = false;

            if (error) {
                showToast(error.message, 'error');
                renderApp();
                return;
            }
            state.isLoggedIn = true;
            state.user = data.user;
            localStorage.setItem('anajak_session', JSON.stringify({ user: data.user }));
            showToast(`Welcome back, ${data.user.email}!`, 'success');
            navigate('admin');
        };

        // Override logout
        const originalLogout = handleLogout;
        window.handleLogout = async function() {
            await supabase.signOut();
            state.isLoggedIn = false;
            state.user = null;
            localStorage.removeItem('anajak_session');
            showToast('Logged out', 'info');
            navigate('home');
        };

        // Make CRUD functions globally accessible for inline onclick
        window.handleDeleteItem = handleDeleteItem;
        window.navigate = navigate;
        window.toggleTheme = toggleTheme;

        // Expose state for debugging
        window.__state = state;

        // Start the app
        init();
    </script>

</body>
</html>
